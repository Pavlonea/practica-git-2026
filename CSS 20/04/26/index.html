<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejemplos CSS</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
      
      h1.titulo {
        font-size: 26px;
      }
      ol  li strong {
            color: red;
        }

      ul strong {
        color: green;
      }

      p strong {
        color: blue;
      }
      body {
        background-color: yellow;
      }
    </style>
</head>
<body>
    <h1 class="titulo">Programción III</h1>
    <p class="titulo">Primer ejemplo con estilos CSS.</p>
    <p>Segundo parrafo con elemento <strong>strong</strong>.</p>
    <ul>
        <p>Un <strong>parrafo</strong></p>
        <li>Un <strong>Item</strong></li>
    </ul>
    <ol>
        <li>Otro<strong>Item</strong></li>
    </ol>
        
    

</body>
</html>
